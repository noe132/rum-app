name: Build/Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v2
        with:
          node-version: 14
          cache: 'yarn'

      - name: Tests
        run: |
          sudo apt-get install libgbm1
          yarn
          yarn build:test
          xvfb-run --auto-servernum --server-args='-screen 0, 1600x900x24' yarn test:prod
